spring:
  application:
    name: heima-ai
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
    url: jdbc:mysql://localhost:3306/deepai
  data:
    redis:
      database: 2
      host: 127.0.0.1
      port: 6379
      timeout: 10s
      lettuce:
        pool:
          max-active: 200
          max-wait: -1ms
          max-idle: 10
          min-idle: 0
  autoconfigure:
    exclude: org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration
  ai:
    dashscope:
      api-key: sk-5cc256809ca44b02b6c1921785639068
      chat:
        options:
          model: qwen3-max
      tts:
        options:
          model: sambert-zhichu-v1
      image:
        options:
          model: wanx-v1

sa-token:
  token-name: satoken
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: random-32
  is-log: true
  is-read-header: true
  is-read-body: false

logging:
  level:
    cn.dev33.satoken: DEBUG

milvus:
  enabled: true

server:
  port: 8001

# Agent 配置
# 博查联网搜索（免费注册: https://open.bochaai.com 每天100次）
bocha:
  api-key: sk-3fb851e8c7ab42eb8afb0dee47edcf76

# 外部 MCP Server（逗号分隔: name:command）自动发现工具
mcp:
  servers: text:python3 /Users/yipingchuan/IdeaProjects/aicode/vollocAI/mcp-text-server.py
  # 多个示例: text:python3 /path/text-server.py, sms:python3 /path/sms-server.py

volloc:
  agent:
    max-calls: 6
    max-steps: 10
    tool-timeout: 30000
    deep:
      finish-strategy: atLeastHalf   # atLeastHalf / atLeastTwo / noLimit / evidenceBased
  react:
    max-tool-calls: 6
    max-steps: 10
    tool-timeout-ms: 30000
    max-obs-in-context: 2000
    model-cache-size: 32
