spring:
  application:
    name: heima-ai
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
    url: jdbc:mysql://localhost:3306/deepai
  data:
    # redis配置
    redis:
      # Redis数据库索引（默认为0）
      database: 2
      # Redis服务器地址
      host: 127.0.0.1
      # Redis服务器连接端口
      port: 6379
      # 连接超时时间
      timeout: 10s
      lettuce:
        pool:
          # 连接池最大连接数
          max-active: 200
          # 连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: -1ms
          # 连接池中的最大空闲连接
          max-idle: 10
          # 连接池中的最小空闲连接
          min-idle: 0
ai:
  api:
    key: "sk-y6Fjx7V2YtsEUEOAELMk4h1GJocPrKeBXT7LKDBIxDWAGGl4"
    url: "https://www.ggwk1.online/v1/chat/completions"
    model: "claude-3-7-sonnet-20250219-thinking"  #模型
    stream: true     #流式

sa-token:
  token-name: satoken
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: random-32
  is-log: true
  is-read-header: true
logging:
  level:
    cn:
      dev33:
        satoken=DEBUG:
  autoconfigure:
    exclude: org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration
  ai:
    dashscope:
      api-key: sk-5cc256809ca44b02b6c1921785639068
      chat:
        options:
          model: qwen3-max
      tts:
        options:
          model: sambert-zhichu-v1
      image:
        options:
          model: wanx-v1

volloc:
  model:
    text: qwen3-max
    image: wanx-v1
    voice: sambert-zhichu-v1

server:
  port: 8001
rocketmq:
  name-server: 127.0.0.1:9876   # 替换为你的实际 NameServer 地址
  producer:
    group: test-producer-group
  consumer:
    group: test-consumer-group
