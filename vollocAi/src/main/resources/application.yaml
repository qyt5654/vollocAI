spring:
  application:
    name: heima-ai
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
    url: jdbc:mysql://localhost:3306/deepai
  data:
    redis:
      database: 2
      host: 127.0.0.1
      port: 6379
      timeout: 10s
      lettuce:
        pool:
          max-active: 200
          max-wait: -1ms
          max-idle: 10
          min-idle: 0
  autoconfigure:
    exclude: org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration
  ai:
    dashscope:
      api-key: sk-5cc256809ca44b02b6c1921785639068
      chat:
        options:
          model: qwen3-max
      tts:
        options:
          model: sambert-zhichu-v1
      image:
        options:
          model: wanx-v1

sa-token:
  token-name: satoken
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: random-32
  is-log: true
  is-read-header: true
  is-read-body: false

logging:
  level:
    cn.dev33.satoken: DEBUG

milvus:
  enabled: true

server:
  port: 8001

# 显式 ReAct Agent（非 Function Calling）
volloc:
  react:
    max-tool-calls: 6
    max-steps: 10
    tool-timeout-ms: 30000
    max-obs-in-context: 2000
    model-cache-size: 32
